name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentSwarm
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - SddInit
  - SddStatus
  - SddWorktree
  - SddMove
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  sdd-product-manager:
    description: Complex product discovery and BDD scenarios.
  sdd-tech-lead:
    description: Complex technical setup and stack decisions on main.
  sdd-designer:
    description: Large Pencil design system or complex feature design.
  sdd-tech-specifier:
    description: Complex technical specs and test plans.
  sdd-developer:
    description: TDD implementation in a feature worktree.
  sdd-auditor:
    description: Testing, review, and quality gate feedback.
