name: agent
description: Spectre — senior development co-pilot for product discovery, stack decisions, Gherkin stories, design-to-code implementation, and TDD

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - FetchURL
  - Reference
  - Knowledge
  - Agent
  - AgentSwarm
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  stack:
    description: Library and technology-stack research — latest stable versions and compatibility checks. Delegate stack decisions and "current version of X / is X compatible with Y" research here.
