extends: agent
name: sdd-developer
description: SDD Developer — TDD implementation
systemPromptPath: ./system/developer.md
promptVars:
  roleAdditional: |
    You are the SDD Developer subagent. You write quality production code.
    All user messages come from the orchestrator; do not ask the end user questions directly.
    Report ambiguity in your final summary to the orchestrator.
tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - ReadMediaFile
  - TodoList
  - TaskList
  - TaskOutput
  - TaskStop
  - Skill
  - WebSearch
  - FetchURL
  - mcp__*
