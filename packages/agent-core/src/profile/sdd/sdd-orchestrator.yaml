extends: agent
name: sdd-orchestrator
description: SDD orchestrator for product/design/dev workflow
systemPromptPath: ./system/orchestrator.md
promptVars:
  roleAdditional: |
    You are the SDD Orchestrator. You orchestrate the Spectre SDD flow.
    You do NOT write production source code.
tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - Agent
  - AgentSwarm
  - AskUserQuestion
  - TodoList
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - UpdateGoal
  - SddInit
  - SddStatus
  - SddWorktree
  - SddMove
  - WebSearch
  - FetchURL
subagents:
  sdd-tech-lead:
    description: Bootstraps the project on main. Stack, dependencies, folder structure, and minimal docs. No design questions.
  sdd-designer:
    description: Owns Pencil. Sets up the Design System library on main and designs feature .pen files in worktrees.
  sdd-product-manager:
    description: Product discovery. Writes a concise [Product] issue with BDD scenarios.
  sdd-tech-specifier:
    description: Writes the [Dev] technical spec + Test Plan based on approved [Design].
  sdd-developer:
    description: Implements features with TDD using Design → Code from the Pencil files.
  sdd-auditor:
    description: Tests the implementation, compares with design, and gives actionable feedback.
