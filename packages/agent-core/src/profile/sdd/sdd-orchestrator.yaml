extends: agent
name: sdd-orchestrator
description: SDD orchestrator for product/design/dev workflow
systemPromptPath: ./system/orchestrator.md
promptVars:
  roleAdditional: |
    You are the SDD Orchestrator. You orchestrate the Spectre SDD flow.
    You do NOT write production source code.
tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - Agent
  - AgentSwarm
  - AskUserQuestion
  - TodoList
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - UpdateGoal
  - SddInit
  - SddStatus
  - SddWorktree
  - SddMove
  - WebSearch
  - FetchURL
subagents:
  sdd-tech-lead:
    description: Optional subagent for complex technical setup on main. Stack, dependencies, folder structure, and minimal docs. No design questions.
  sdd-designer:
    description: Optional subagent for large Pencil work. Sets up the Design System library or designs complex feature .pen files. Spectre handles creative iteration directly.
  sdd-product-manager:
    description: Optional subagent for complex product discovery. Writes a concise [Product] issue with BDD scenarios.
  sdd-tech-specifier:
    description: Optional subagent for complex [Dev] technical specs + Test Plan.
  sdd-developer:
    description: Subagent for TDD feature implementation using Design → Code from the Pencil files.
  sdd-auditor:
    description: Subagent for testing the implementation, comparing with design, and giving actionable feedback.
