name: Spectre Auto Tag

on:
  push:
    branches:
      - main

concurrency:
  group: spectre-auto-tag
  cancel-in-progress: true

jobs:
  auto-tag:
    name: Create release tag from main
    runs-on: ubuntu-latest
    if: github.repository_owner == 'abelcondev'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine next version
        id: version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [[ -z "$latest" ]]; then
            latest="v0.0.0"
          fi

          if [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            echo "Latest tag '$latest' does not match semver. Falling back to v0.0.0."
            major=0; minor=0; patch=0
          fi

          new_patch=$((patch + 1))
          new_tag="v${major}.${minor}.${new_patch}"

          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest"
          echo "New tag:    $new_tag"

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"
