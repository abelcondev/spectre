name: Spectre Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  native-artifacts:
    name: Native artifacts
    uses: ./.github/workflows/_spectre-native-build.yml
    with:
      upload-artifact-prefix: spectre-native
      retention-days: 7
      sign-macos: false

  publish-release:
    name: Publish GitHub Release
    needs: native-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: spectre-native-*
          path: dist-native-release
          merge-multiple: true

      - name: Produce manifest.json
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node apps/kimi-code/scripts/native/produce-manifest.mjs dist-native-release "${{ github.ref_name }}"

      - name: Build plugin marketplace artifacts
        run: pnpm --filter @abelcondev/spectre run build:plugin-marketplace

      - name: Prepare updater release assets
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          printf '%s' "${version}" > dist-native-release/latest
          printf '%s\n' "{\"version\": \"${version}\", \"publishedAt\": \"${published_at}\", \"rollout\": []}" > dist-native-release/latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          assets=()
          while IFS= read -r -d '' f; do assets+=("$f"); done < <(find dist-native-release -maxdepth 1 -type f -print0)
          [[ -f install.sh ]] && assets+=("install.sh")
          while IFS= read -r -d '' f; do assets+=("$f"); done < <(find plugins/cdn -type f -print0)
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
            gh release edit "${tag}" --title "Spectre ${tag}"
          else
            gh release create "${tag}" \
              --title "Spectre ${tag}" \
              --generate-notes \
              "${assets[@]}"
          fi
