name: Specter Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  native-artifacts:
    name: Native artifacts
    uses: ./.github/workflows/_spectre-native-build.yml
    with:
      upload-artifact-prefix: spectre-native
      retention-days: 7
      sign-macos: false

  publish-release:
    name: Publish GitHub Release
    needs: native-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: spectre-native-*
          path: dist-native-release
          merge-multiple: true

      - name: Produce manifest.json
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node apps/kimi-code/scripts/native/produce-manifest.mjs dist-native-release "${{ github.ref_name }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Specter ${{ github.ref_name }}" \
            --generate-notes \
            dist-native-release/* install.sh
